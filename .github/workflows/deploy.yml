name: Deploy Quartz

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Prepare notes
        run: |
          mkdir -p "$RUNNER_TEMP/quartz-content"
          cp -R "拉康派精神分析知识图谱" "$RUNNER_TEMP/quartz-content/"
          cp -R "拉康理论逻辑" "$RUNNER_TEMP/quartz-content/"
          cp -R "相关图片" "$RUNNER_TEMP/quartz-content/"
          cp index.md "$RUNNER_TEMP/quartz-content/index.md"

      - name: Install Quartz plugins
        run: npx quartz plugin install

      - name: Build Quartz
        run: npx quartz build -d "$RUNNER_TEMP/quartz-content" -v

      - name: Setup Pages
        uses: actions/configure-pages@v6
        with:
          enablement: true

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: public

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
